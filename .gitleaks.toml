title = "dotfiles gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "homelab-ip"
description = "Homelab IP address"
regex = '''10\.10\.30\.\d{1,3}'''
tags = ["ip", "homelab"]

[[rules]]
id = "op-reference"
description = "1Password secret reference"
regex = '''op://[A-Za-z0-9/_-]+/[A-Za-z0-9/_-]+'''
tags = ["1password"]

[allowlist]
paths = [
    '''CLAUDE\.md''',
    '''README\.md''',
    '''\.gitleaks\.toml''',
    '''docs/''',
]
